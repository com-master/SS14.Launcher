name: Sync upstream

on:
  schedule:
    - cron: '0 6 * * *'  # every day at 06:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/space-wizards/SS14.Launcher.git

      - name: Fetch upstream master
        run: git fetch upstream master

      - name: Rebase onto upstream/master
        id: rebase
        run: |
          if git rebase upstream/master; then
            echo "result=success" >> $GITHUB_OUTPUT
          else
            git rebase --abort
            echo "result=conflict" >> $GITHUB_OUTPUT
          fi

      - name: Push rebased branch
        if: steps.rebase.outputs.result == 'success'
        run: git push origin HEAD --force-with-lease

      - name: Open issue on conflict
        if: steps.rebase.outputs.result == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Rebase conflict with upstream/master';
            const body = [
              '## Upstream sync failed',
              '',
              'The automatic rebase onto `space-wizards/SS14.Launcher` master failed due to conflicts.',
              '',
              'To resolve manually:',
              '```bash',
              'git fetch upstream master',
              'git rebase upstream/master',
              '# fix conflicts',
              'git rebase --continue',
              'git push origin HEAD --force-with-lease',
              '```',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['upstream-conflict'],
            });

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['upstream-conflict'],
              });
            }
